<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordstat Media Planner</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="container">
    <h1>Медиаплан на базе Яндекс Wordstat API</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form action="/generate" method="post">
      <label>Ниша*
        <input type="text" name="niche" required>
      </label>

      <label>Регион*
        <input type="text" name="region" required>
      </label>

      <label>Месячный бюджет
        <input type="number" name="monthly_budget" min="1" step="0.01">
      </label>

      <label>Цель кампании
        <textarea name="campaign_goal" rows="3"></textarea>
      </label>

      <button type="submit">Сформировать медиаплан</button>
    </form>
  </main>
</body>
</html>
